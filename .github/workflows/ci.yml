# CI: every push re-proves the Phase 0 exit criterion (determinism test).
# Runs on GitHub's servers, not the VM — a fresh machine each time, which is
# exactly the point: determinism must hold across machines, not just here.
name: CI
on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: pytest -q
